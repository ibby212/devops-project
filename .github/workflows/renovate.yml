name: Renovate Bot

on:
  # Runs automatically at midnight
  schedule:
    - cron: '0 0 * * *'
  # Allows you to trigger it manually from the GitHub UI!
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Run Renovate
        uses: renovatebot/github-action@v40.1.3
        with:
          configurationFile: renovate.json
          # Uses the default GitHub token to create the Pull Requests
          token: ${{ secrets.GITHUB_TOKEN }}